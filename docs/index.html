<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lumen v2</title>
    <style>
      :root {
        color: #201629;
        background: #fffdf8;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        line-height: 1.6;
      }

      main {
        width: min(720px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 12px;
        color: #4a1a7a;
        font-size: clamp(36px, 8vw, 64px);
        line-height: 1;
      }

      p {
        max-width: 640px;
        margin: 0 0 18px;
        color: #44364f;
        font-size: 18px;
      }

      a {
        color: #4a1a7a;
        font-weight: 700;
        text-decoration-color: rgba(74, 26, 122, 0.28);
        text-underline-offset: 4px;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 16px;
        border: 1px solid rgba(74, 26, 122, 0.24);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(74, 26, 122, 0.08);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lumen v2</h1>
      <p>
        Lumen is a browser extension for leaving contextual Lens cards on webpages.
        It is built for small-group social reading and lightweight companion mode.
      </p>
      <div class="links">
        <a class="button" href="./privacy.html">Privacy Policy</a>
        <a class="button" href="https://github.com/Kuwaaaa/SSLens">GitHub Repository</a>
      </div>
    </main>
  </body>
</html>
