upstream lumen_server {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    location / {
        proxy_pass http://lumen_server;
        proxy_http_version 1.1;
        include conf.d/proxy-headers.conf;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
